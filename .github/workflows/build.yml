name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        default: ''
      platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - windows

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        if: inputs.version != ''
        run: |
          echo "${{ inputs.version }}" > VERSION
          sed -i "s/0.1.0a/${{ inputs.version }}/g" amethyst.spec
          sed -i "s/VERSION = \"0.1.0a\"/VERSION = \"${{ inputs.version }}\"/g" main.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyside6==6.7.0

      - name: Build with PyInstaller
        run: pyinstaller amethyst.spec --noconfirm

      - name: Create deb package
        run: |
          cd dist
          VERSION=$(cat ../VERSION 2>/dev/null || echo "0.1.0a")
          mkdir -p AmethystLauncher-pkg/usr/bin
          mkdir -p AmethystLauncher-pkg/usr/share/applications
          mkdir -p AmethystLauncher-pkg/usr/share/icons
          cp -r AmethystLauncher AmethystLauncher-pkg/usr/bin/AmethystLauncher
          cp ../amethst.png AmethystLauncher-pkg/usr/share/icons/ 2>/dev/null || true
          printf 'Package: amethyst-launcher\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: amd64\nDepends: libc6, libstdc++6, libgl1-mesa-glx, libxcb-xinerama0, libxcb-cursor0, libxkbcommon-x11-0, libdbus-1-3\nMaintainer: Amethyst Team\nDescription: Amethyst Launcher\n' "$VERSION" > AmethystLauncher-pkg/DEBIAN/control
          dpkg-deb --build AmethystLauncher-pkg AmethystLauncher-$VERSION.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst_linux
          path: dist/AmethystLauncher-*.deb
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        if: inputs.version != ''
        run: |
          echo "${{ inputs.version }}" > VERSION
          (Get-Content amethyst.spec) -replace '0.1.0a', '${{ inputs.version }}' | Set-Content amethyst.spec
          $mainPy = Get-Content main.py -Raw
          $mainPy = $mainPy -replace 'VERSION = "0.1.0a"', "VERSION = `"$($env:GITHUB_REF_NAME)`""
          Set-Content -Path main.py -Value $mainPy
          (Get-Content installer.iss) -replace '0\.1\.0a', '${{ inputs.version }}' | Set-Content installer.iss

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyside6==6.7.0

      - name: Build with PyInstaller
        run: pyinstaller amethyst.spec --noconfirm

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Installer
        run: |
          iscc installer.iss

      - name: Find installer
        run: |
          $ver = Get-Content VERSION -Raw -ErrorAction SilentlyContinue
          if (-not $ver) { $ver = "0.1.0a" }
          Get-ChildItem -Filter "AmethystLauncher-$ver-Setup.exe" | Select-Object -ExpandProperty FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst_windows
          path: AmethystLauncher-*-Setup.exe
          retention-days: 30