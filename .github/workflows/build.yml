name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        default: ''
      platform:
        description: 'Platform to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linux
          - windows

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        if: inputs.version != ''
        run: |
          echo "${{ inputs.version }}" > VERSION
          sed -i "s/0.1.0a/${{ inputs.version }}/g" amethyst.spec
          sed -i "s/VERSION = \"0.1.0a\"/VERSION = \"${{ inputs.version }}\"/g" main.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyside6==6.7.0

      - name: Build with PyInstaller
        run: pyinstaller amethyst.spec --noconfirm

      - name: Create archive
        run: |
          cd dist
          VERSION=$(cat ../VERSION 2>/dev/null || echo "0.1.0a")
          tar -cvzf AmethystLauncher-$VERSION-linux.tar.gz AmethystLauncher/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-linux
          path: dist/AmethystLauncher-*-linux.tar.gz
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        if: inputs.version != ''
        run: |
          echo "${{ inputs.version }}" > VERSION
          (Get-Content amethyst.spec) -replace '0.1.0a', '${{ inputs.version }}' | Set-Content amethyst.spec
          $mainPy = Get-Content main.py -Raw
          $mainPy = $mainPy -replace 'VERSION = "0.1.0a"', "VERSION = `"${{ inputs.version }}`""
          Set-Content -Path main.py -Value $mainPy
          (Get-Content installer.iss) -replace '0\.1\.0a', '${{ inputs.version }}' | Set-Content installer.iss

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller pyside6==6.7.0

      - name: Build with PyInstaller
        run: pyinstaller amethyst.spec --noconfirm

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Installer
        run: |
          iscc installer.iss

      - name: Find installer
        run: |
          $ver = Get-Content VERSION -Raw -ErrorAction SilentlyContinue
          if (-not $ver) { $ver = "0.1.0a" }
          Get-ChildItem -Filter "AmethystLauncher-$ver-Setup.exe" | Select-Object -ExpandProperty FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst_windows
          path: AmethystLauncher-*-Setup.exe
          retention-days: 30